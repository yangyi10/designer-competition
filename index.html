<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计竞赛作品展示</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 密码保护层 -->
    <div id="password-protect">
        <div class="password-container">
            <h2>请输入访问密码</h2>
            <input type="password" id="password-input" placeholder="请输入密码">
            <button onclick="checkPassword()">进入</button>
            <p id="error-message" style="color:red;display:none;">密码错误，请重试</p>
        </div>
    </div>

    <!-- 主要内容（默认隐藏） -->
    <div id="content" style="display:none;">
        <header>
            <div class="header-content">
                <h1>乔山第三届高校创意设计竞赛</h1>
                <p>智享健康，创想无界</p>
            </div>
        </header>

        <main>
            <div class="container">
                <div class="filter-bar">
                    <span class="filter-title">筛选:</span>
                    <button class="filter-btn active" data-category="all">全部</button>
                    <button class="filter-btn" data-category="fitness">健身器材</button>
                    <button class="filter-btn" data-category="massage">按摩椅</button>
                </div>

                <div class="grid">
                    <!-- 作品卡片将由JavaScript生成 -->
                </div>
            </div>
        </main>

        <!-- 详情弹窗 -->
        <div class="modal" id="modal">
            <div class="modal-content">
                <span class="close-btn" id="closeBtn">&times;</span>
                <div class="modal-body" id="modalBody">
                    <!-- 详情内容将由JavaScript填充 -->
                </div>
            </div>
        </div>

        <!-- 图片灯箱 -->
        <div class="lightbox" id="lightbox">
            <div class="lightbox-content">
                <span class="lightbox-close" id="lightboxClose">&times;</span>
                <button class="lightbox-prev" onclick="lightboxPrev()">&#10094;</button>
                <img src="" alt="" class="lightbox-image" id="lightboxImage">
                <button class="lightbox-next" onclick="lightboxNext()">&#10095;</button>
                <div class="lightbox-counter" id="lightboxCounter">1 / 5</div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 乔山设计竞赛组委会</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
